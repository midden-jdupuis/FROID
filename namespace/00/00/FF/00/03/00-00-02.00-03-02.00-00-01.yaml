node_id: 00-00-02.00-03-02.00-00-01
node_nam: FROID Node
node_tag: FOLIO
rules:
  existence:
    - valid_NODE_ID_does_not_imply_FOLIO_exists
    - FOLIO_exists_iff_FLIO_REF_present
  immutability: committed_FOLIO_is_frozen
  feature_validity:
    - one_deepest_nonzero_DPH
    - all_higher_non_root_DPH_must_be_nonzero
    - all_lower_DPH_must_be_00
    - no_gaps_permitted
  standalone_validity:
    - MM_must_be_in: [01, 02, 03]
    - TT_must_be_nonzero
    - II_must_be_nonzero
    - selectors_VV_BB_CC_UU_KK_may_be_00_or_nonzero_independently
  ancestor_chain:
    - non_root_feature_FOLIO_requires_all_ancestors_assigned
  revision_set:
    - peers_across_MM_01_02_03_must_all_materialize
    - later_II_must_supersede_immediate_predecessor
constraints:
  reserved_FF: MUST_NOT_appear_in_assigned_NODE_ID
  root_assignment: root_MUST_be_assigned_if_any_FOLIO_is_assigned
relations:
  identity: NODE_ID
  manifest: FLIO_REF
  artifacts: zero_or_more_ARTIFACT
  parent_derivation: deepest_nonzero_SEGMENT_replaced_by_00
  equality: equal_NODE_ID_implies_equal_FOLIO

binding: structural
