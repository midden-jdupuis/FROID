node_id: 00-00-02.00-03-02.01-00-01
node_nam: Folio Manifest
node_tag: FLIO_REF
rules:
  filename: MUST_match_node_id_field_exactly
  uniqueness: only_one_FLIO_REF_per_NODE_ID
  immutability: frozen_after_commit
  fields:
    node_nam:
      type: printable_ASCII
      range: U+0020_to_U+007E
      length: "1 to 128"
      no_leading_trailing_whitespace: true
    created:
      format: ISO_8601_with_timezone
      meaning: commit_timestamp_not_write_timestamp
    binding:
      allowed: [overlay, structural]
    status:
      allowed: [active, superseded, deferred, retired]
      transition: new_FOLIO_required_for_state_change
    authority:
      allowed: [normative, descriptive]
    owner:
      pattern: "[A-Za-z0-9._@-]{1,64}"
    payload:
      type: ordered_list
      uniqueness: no_duplicate_artifact_refs
      filesystem: artifact_filename_in_leaf_directory
      exclusion: MUST_NOT_equal_froid_manifest_filename
    record_hash:
      format: 64_char_lowercase_hex_SHA256
      computed_with: record_hash_field_omitted
    payload_hash:
      format: 64_char_lowercase_hex_SHA256
      omit_if: payload_empty_or_absent
  supersession:
    no_NODE_ID_in_both_supersedes_and_superseded_by: true
    reciprocal_if_both_ends_present: true
constraints:
  TT_02_companion: requires_TT_01_to_exist_for_same_selector_MM_II
relations:
  describes: exactly_one_FOLIO
  required_by: FOLIO
  references_via_payload: zero_or_more_ARTIFACT
