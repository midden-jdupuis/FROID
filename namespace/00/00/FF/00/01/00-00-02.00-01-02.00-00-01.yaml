node_id: 00-00-02.00-01-02.00-00-01
node_nam: Node Identifier
node_tag: NODE_ID
rules:
  - parsers_MUST_normalize_lowercase_to_uppercase
  - equality: byte_identical_canonical_forms
  - assignment_required_to_identify_FOLIO
  - unassigned: denotes_empty_namespace_position
  - lower_segments_all_00: identifies_FIN_at_depth_of_deepest_nonzero
  - x660_alignment: available_via_deterministic_forward_mapping
constraints:
  segment_count: 9
  segment_format: two_hexadecimal_digits
  reserved: FF_syntactically_valid_but_MUST_NOT_appear_in_assigned_NODE_ID
  identity: 00_denotes_identity_at_DPH
  assignable_range: "01 to FE unless DEPTH constrains further"
relations:
  composed_of: SEGMENT
  identifies: FOLIO_when_assigned
  has_name: NODE_NAM
  has_short_name: NODE_TAG

binding: structural
